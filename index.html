<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC Weekly Health Pulse</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #005f6b; }
        .chart-container { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weekly Health Pulse</h1>
        <p>대한민국 건강 데이터 모니터링</p>
        
        <div id="data-display">
            <p>데이터를 불러오는 중...</p>
        </div>

        <div class="chart-container">
            <canvas id="healthChart"></canvas>
        </div>
    </div>

    <script>
        // 원래 프로젝트에 있던 데이터 연동 스크립트 구조
        async function loadData() {
            try {
                // 데이터 파일 경로
                const response = await fetch('./data/data.json'); 
                const data = await response.json();
                
                document.getElementById('data-display').innerHTML = `<h3>최신 현황: ${data.status}</h3>`;
                
                // 차트 생성 로직
                const ctx = document.getElementById('healthChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.labels,
                        datasets: [{ label: '질병 발생률', data: data.values, borderColor: '#005f6b' }]
                    }
                });
            } catch (e) {
                console.error("데이터 로드 실패:", e);
                document.getElementById('data-display').innerHTML = "<p>데이터를 불러오지 못했습니다.</p>";
            }
        }
        loadData();
    </script>
</body>
</html>
