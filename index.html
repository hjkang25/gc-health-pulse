<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GC Weekly Health Pulse</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>

/* ═══════════════════════════════════════════════

   GC Weekly Health Pulse  |  디자인 엔진

   이 파일은 수정하지 마세요.

   데이터 업데이트: data/latest.json 만 수정 후 push

═══════════════════════════════════════════════ */

:root{

  --teal:#005f6b;--teal2:#00909e;--teal-light:#e0f4f6;

  --ink:#0d1117;--paper:#eef3f7;--white:#fff;

  --red:#c0392b;--amber:#d4820a;

  --rule:#dde3ea;--muted:#6b7280;

  --sh:0 2px 16px rgba(0,95,107,.08),0 1px 3px rgba(0,0,0,.05);

  --sh-lg:0 6px 28px rgba(0,95,107,.13),0 2px 8px rgba(0,0,0,.06);

}

*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{font-family:"Noto Sans KR",sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}

.view{display:none;}.view.active{display:block;}



/* loading */

#loading{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s;}

#loading.hide{opacity:0;pointer-events:none;}

.ld-logo{font-family:"Noto Serif KR",serif;font-size:22px;font-weight:900;color:#fff;letter-spacing:-.01em;margin-bottom:20px;}

.ld-logo span{color:var(--teal2);}

.ld-bar{width:180px;height:2px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}

.ld-fill{height:100%;background:var(--teal2);border-radius:2px;animation:ldAnim 1.2s ease-in-out infinite;}

@keyframes ldAnim{0%{width:0;margin-left:0;}50%{width:100%;margin-left:0;}100%{width:0;margin-left:100%;};}



/* TOPBAR */

.topbar{background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:52px;}

.tb-l{display:flex;align-items:center;gap:13px;}

.tb-logo{font-family:"Noto Serif KR",serif;font-size:17px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:-.01em;}

.tb-logo span{color:var(--teal2);}

.tb-issue{font-family:"DM Mono",monospace;font-size:10px;color:rgba(255,255,255,.32);letter-spacing:.1em;}

.tb-date{font-family:"DM Mono",monospace;font-size:10px;color:rgba(255,255,255,.28);}



/* HERO */

.hero{min-height:calc(100vh - 52px);display:grid;grid-template-columns:1fr 310px;}



/* LEFT */

.hl{padding:44px 40px 36px;display:flex;flex-direction:column;background:#fff;border-right:1px solid var(--rule);}

.eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:18px;}

.e-pill{background:var(--teal);color:#fff;font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.18em;padding:4px 10px;border-radius:3px;text-transform:uppercase;}

.e-line{font-family:"DM Mono",monospace;font-size:10px;color:var(--muted);letter-spacing:.06em;}

.headline{font-family:"Noto Sans KR",sans-serif;font-weight:900;font-size:34px;line-height:1.24;letter-spacing:-.025em;margin-bottom:10px;}

.headline span{color:var(--teal);}

.subline{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:28px;border-left:2px solid var(--teal);padding-left:12px;}

.rk-hdr{display:flex;align-items:center;gap:7px;margin-bottom:11px;}

.rk-dot{width:6px;height:6px;background:var(--teal);border-radius:50%;}

.rk-lbl{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.2em;color:var(--teal);text-transform:uppercase;}

.rk-title{font-family:"Noto Serif KR",serif;font-size:15.5px;font-weight:700;margin-bottom:3px;}

.rk-src{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:13px;}

.rk-list{list-style:none;}

.rk-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--rule);}

.rk-item:last-child{border-bottom:none;}

.rn{font-family:"DM Mono",monospace;font-size:12px;font-weight:500;color:var(--teal);width:22px;flex-shrink:0;}

.ri{flex:1;}.rname{font-weight:700;font-size:13.5px;margin-bottom:1px;}.rsub{font-size:11px;color:var(--muted);}

.badge{font-family:"DM Mono",monospace;font-size:10.5px;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}

.b-up{background:#fef0ee;color:var(--red);}.b-new{background:var(--teal-light);color:var(--teal);}

.b-mid{background:#fef8ec;color:var(--amber);}.b-dn{background:#f0f7f0;color:#2e7d32;}

.focus-box{margin-top:20px;padding:15px 17px;background:var(--teal-light);border-radius:8px;border-left:3px solid var(--teal);}

.focus-tag{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.18em;color:var(--teal);text-transform:uppercase;margin-bottom:5px;}

.focus-title{font-family:"Noto Serif KR",serif;font-size:15px;font-weight:700;margin-bottom:4px;}

.focus-desc{font-size:12px;color:var(--muted);line-height:1.6;}

.cta-area{margin-top:auto;padding-top:22px;}

.cta-btn{display:inline-flex;align-items:center;gap:10px;background:var(--teal);color:#fff;font-family:"Noto Sans KR",sans-serif;font-size:13px;font-weight:700;padding:13px 22px;border:none;cursor:pointer;border-radius:4px;transition:background .2s;}

.cta-btn:hover{background:var(--teal2);}

.cta-btn svg{width:15px;height:15px;}

.cta-hint{font-size:11px;color:var(--muted);margin-top:7px;}



/* RIGHT */

.hr{padding:24px 20px;display:flex;flex-direction:column;gap:10px;background:var(--paper);}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}

.sc{background:#fff;border-radius:10px;padding:12px 9px 10px;box-shadow:var(--sh);text-align:center;position:relative;overflow:hidden;}

.sc::after{content:"";position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:10px 10px 0 0;}

.sc.red::after{background:var(--red);}.sc.teal::after{background:var(--teal);}.sc.amber::after{background:var(--amber);}

.sc-period{font-family:"DM Mono",monospace;font-size:8.5px;color:var(--muted);letter-spacing:.05em;margin-bottom:3px;}

.sc-val{font-family:"Noto Serif KR",serif;font-size:22px;font-weight:700;line-height:1;margin-bottom:3px;}

.sc-val sub{font-size:11px;font-weight:500;}

.sc.red .sc-val{color:var(--red);}.sc.teal .sc-val{color:var(--teal);}.sc.amber .sc-val{color:var(--amber);}

.sc-lbl{font-size:10.5px;font-weight:500;line-height:1.4;margin-bottom:5px;}

.sc-chg{font-family:"DM Mono",monospace;font-size:9px;display:inline-block;padding:2px 6px;border-radius:20px;}

.sc.red .sc-chg{background:#fef0ee;color:var(--red);}

.sc.teal .sc-chg{background:var(--teal-light);color:var(--teal);}

.sc.amber .sc-chg{background:#fef8ec;color:var(--amber);}

.big-card{background:var(--teal);border-radius:12px;padding:20px;box-shadow:var(--sh-lg);}

.bc-unit{font-family:"DM Mono",monospace;font-size:9px;color:rgba(255,255,255,.52);letter-spacing:.08em;margin-bottom:4px;}

.bc-num{font-family:"Noto Serif KR",serif;font-size:52px;font-weight:900;line-height:.9;color:#fff;letter-spacing:-.02em;}

.bc-num sup{font-size:15px;font-weight:700;vertical-align:top;margin-top:9px;display:inline-block;}

.bc-desc{font-size:11.5px;line-height:1.6;color:rgba(255,255,255,.82);margin-top:8px;}

.bc-desc strong{color:#fff;}

.watch-card{background:#fff;border-radius:10px;padding:14px 15px;box-shadow:var(--sh);}

.wc-lbl{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.18em;color:var(--teal);text-transform:uppercase;margin-bottom:10px;}

.w-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--rule);}

.w-row:last-child{border-bottom:none;}

.w-name{font-size:12.5px;font-weight:500;}

.char-wrap{display:flex;justify-content:center;align-items:flex-end;position:relative;padding-top:6px;}

.char-speech{position:absolute;top:0;left:50%;transform:translateX(-50%);background:#fff;border-radius:8px 8px 8px 2px;padding:6px 11px;font-size:10px;font-weight:600;color:var(--teal);white-space:nowrap;box-shadow:var(--sh);border:1px solid var(--teal-light);text-align:center;line-height:1.4;}

.char-speech::after{content:"";position:absolute;bottom:-5px;left:12px;width:8px;height:8px;background:#fff;border-right:1px solid var(--teal-light);border-bottom:1px solid var(--teal-light);transform:rotate(45deg);clip-path:polygon(0 0,100% 100%,0 100%);}

.char-img{width:86px;animation:bob 3.5s ease-in-out infinite;filter:drop-shadow(0 4px 10px rgba(0,95,107,.16));}

@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}



/* DETAIL */

.d-nav{background:var(--teal);display:flex;align-items:center;padding:0 40px;overflow-x:auto;position:sticky;top:0;z-index:100;}

.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.1em;color:#fff;cursor:pointer;padding:13px 14px 13px 0;margin-right:14px;border-right:1px solid rgba(255,255,255,.2);transition:opacity .2s;white-space:nowrap;}

.back-btn:hover{opacity:.7;}

.d-nav a{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.1em;color:rgba(255,255,255,.6);text-decoration:none;padding:13px 14px;border-right:1px solid rgba(255,255,255,.1);white-space:nowrap;transition:all .2s;}

.d-nav a:hover,.d-nav a.act{color:#fff;background:rgba(255,255,255,.12);}

.d-char{position:fixed;bottom:20px;right:22px;z-index:99;width:64px;cursor:pointer;animation:bob 3.5s ease-in-out infinite;filter:drop-shadow(0 3px 10px rgba(0,95,107,.2));transition:transform .2s;}

.d-char:hover{transform:scale(1.1);}

.d-body{max-width:1120px;margin:0 auto;padding:40px;}

.sec{display:flex;align-items:center;gap:12px;margin-bottom:20px;margin-top:48px;}

.sec:first-child{margin-top:0;}

.sec .lbl{font-family:"DM Mono",monospace;font-size:9.5px;letter-spacing:.2em;color:var(--teal);text-transform:uppercase;white-space:nowrap;}

.sec::after{content:"";flex:1;height:1px;background:var(--rule);}

.dc{background:#fff;border-radius:12px;padding:24px;box-shadow:var(--sh);}

.dc-lbl{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}

.dc-lbl::before{content:"";width:5px;height:5px;background:var(--teal);border-radius:50%;display:inline-block;}

.dc h3{font-family:"Noto Serif KR",serif;font-size:17px;font-weight:700;line-height:1.4;margin-bottom:5px;}

.dc .lead{font-size:12.5px;color:var(--muted);line-height:1.65;margin-bottom:16px;}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

.brow{display:flex;align-items:center;gap:10px;margin-bottom:9px;}

.blbl{width:74px;font-size:12px;text-align:right;flex-shrink:0;}

.btrack{flex:1;height:21px;background:#f0f4f7;border-radius:4px;overflow:hidden;}

.bfill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;}

.bfill span{font-family:"DM Mono",monospace;font-size:10px;color:#fff;font-weight:500;}

.hg{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--rule);margin:14px 0 10px;}

.hcell{background:#fff;padding:13px;text-align:center;}.hcell.hot{background:var(--teal-light);}

.hreg{font-family:"DM Mono",monospace;font-size:9px;color:var(--muted);margin-bottom:4px;}

.hdis{font-size:12.5px;font-weight:700;margin-bottom:3px;}

.hpct{font-family:"DM Mono",monospace;font-size:11px;font-weight:500;}

.etip{background:var(--ink);color:#fff;padding:26px;border-radius:12px;position:relative;overflow:hidden;}

.etip::before{content:"❝";position:absolute;top:-8px;right:12px;font-size:80px;color:rgba(255,255,255,.05);font-family:serif;line-height:1;}

.et-tag{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.2em;color:var(--teal2);text-transform:uppercase;margin-bottom:10px;}

.etip blockquote{font-family:"Noto Serif KR",serif;font-size:14.5px;line-height:1.8;color:rgba(255,255,255,.88);border-left:2px solid var(--teal2);padding-left:14px;margin-bottom:16px;}

.eattr{display:flex;align-items:center;gap:10px;}

.eavatar{width:32px;height:32px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;font-family:"Noto Serif KR",serif;}

.ename{font-size:12.5px;font-weight:500;color:#fff;}.erole{font-family:"DM Mono",monospace;font-size:9.5px;color:rgba(255,255,255,.4);margin-top:2px;}

.chk{display:flex;gap:12px;align-items:flex-start;margin-bottom:13px;}.chk:last-child{margin-bottom:0;}

.chk-n{min-width:27px;height:27px;background:var(--teal);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:"DM Mono",monospace;font-size:11px;font-weight:500;flex-shrink:0;}

.chk-title{font-weight:700;font-size:13px;margin-bottom:2px;}.chk-desc{font-size:11.5px;color:var(--muted);line-height:1.6;}

.cwrap{position:relative;height:185px;margin-top:12px;}

.cwrap-t{position:relative;height:225px;margin-top:12px;}

.alert-box{background:#fff8e6;border-left:4px solid var(--amber);padding:12px 15px;display:flex;gap:10px;align-items:flex-start;margin-bottom:24px;border-radius:0 6px 6px 0;}

.alert-ico{font-size:15px;flex-shrink:0;margin-top:1px;}

.alert-txt{font-size:12.5px;line-height:1.55;color:#5a4000;}.alert-txt strong{color:var(--amber);}

.src-bar{background:#e4eaf0;border-top:1px solid var(--rule);padding:11px 40px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}

.src-lbl{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);flex-shrink:0;}

.src-tag{font-family:"DM Mono",monospace;font-size:8.5px;color:var(--teal);background:#fff;border:1px solid rgba(0,95,107,.3);padding:2px 7px;border-radius:20px;}

footer{background:var(--ink);color:rgba(255,255,255,.38);padding:26px 40px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:18px;font-family:"DM Mono",monospace;font-size:10px;line-height:1.8;}

footer .fb{font-family:"Noto Serif KR",serif;font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;}

footer a{color:var(--teal2);text-decoration:none;}

.pdf-btn{background:var(--teal);color:#fff;padding:8px 16px;font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.1em;cursor:pointer;border:none;border-radius:4px;text-transform:uppercase;transition:background .2s;}

.pdf-btn:hover{background:var(--teal2);}



@keyframes fadeUp{from{opacity:0;transform:translateY(13px);}to{opacity:1;transform:translateY(0);}}

@keyframes floatIn{from{opacity:0;transform:translateY(16px) scale(.96);}to{opacity:1;transform:scale(1);}}

.fu{animation:fadeUp .5s ease both;}.fi{animation:floatIn .6s cubic-bezier(.34,1.2,.64,1) both;}

.d0{animation-delay:.04s;}.d1{animation-delay:.1s;}.d2{animation-delay:.17s;}

.d3{animation-delay:.25s;}.d4{animation-delay:.34s;}.d5{animation-delay:.43s;}.d6{animation-delay:.52s;}



@media(max-width:860px){

  .hero{grid-template-columns:1fr;}

  .hr{padding:20px 16px;}

  .g2,.g3{grid-template-columns:1fr;}

  .hg{grid-template-columns:1fr 1fr;}

  .d-body,.topbar,.src-bar,footer{padding-left:18px;padding-right:18px;}

  .d-nav{padding:0 14px;}

}

</style>

</head>

<body>



<!-- 로딩 스크린 -->

<div id="loading">

  <div class="ld-logo">Weekly <span>Health</span> Pulse</div>

  <div class="ld-bar"><div class="ld-fill"></div></div>

</div>



<!-- TOPBAR -->

<div class="topbar">

  <div class="tb-l">

    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">

      <circle cx="14" cy="14" r="13" stroke="#00909e" stroke-width="1.5"/>

      <text x="14" y="19" text-anchor="middle" font-family="Noto Serif KR,serif" font-size="9.5" font-weight="900" fill="white">GC</text>

    </svg>

    <div class="tb-logo" onclick="showView('landing')">Weekly <span>Health</span> Pulse</div>

    <div class="tb-issue" id="tb-issue"></div>

  </div>

  <div class="tb-date" id="tb-date"></div>

</div>



<!-- LANDING -->

<div id="view-landing" class="view active">

<div class="hero">

  <div class="hl">

    <div class="eyebrow fu d0">

      <span class="e-pill">주간 건강 동향</span>

      <span class="e-line" id="e-range"></span>

    </div>

    <h1 class="headline fu d1" id="headline"></h1>

    <p class="subline fu d2" id="subline"></p>

    <div class="fu d3">

      <div class="rk-hdr"><div class="rk-dot"></div><div class="rk-lbl">급상승 증상 검색 키워드 · TOP 5</div></div>

      <div class="rk-title" id="rk-title"></div>

      <div class="rk-src" id="rk-src"></div>

      <ul class="rk-list" id="rk-list"></ul>

    </div>

    <div class="focus-box fu d5" id="focus-box"></div>

    <div class="cta-area fu d6">

      <button class="cta-btn" onclick="showView('detail')">

        이번 주 심층 분석 보기

        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 10h12M12 5l5 5-5 5"/></svg>

      </button>

      <div class="cta-hint" id="cta-hint"></div>

    </div>

  </div>

  <div class="hr">

    <div class="stat-grid fi d2" id="stat-grid"></div>

    <div class="big-card fi d3" id="big-card"></div>

    <div class="watch-card fi d4">

      <div class="wc-lbl">이번 주 주목 질환</div>

      <div id="watch-rows"></div>

    </div>
