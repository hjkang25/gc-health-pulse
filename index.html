<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC Weekly Health Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f9fafb; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Weekly Health Pulse</h1>
            <p class="text-gray-500 text-sm">2026.03.05</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 space-y-6">
                <div class="card p-6 border-l-4 border-teal-600">
                    <h2 class="text-3xl font-bold mb-4">환절기, 당신의 몸이 보내는 시그널</h2>
                    <p class="text-gray-600">데이터는 이미 알고 있습니다. 앱 검색과 병원 처방 데이터의 연결고리.</p>
                </div>
                
                <div class="card p-6">
                    <h3 class="font-bold mb-4">이번 주 대한민국이 검색한 증상들</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                            <span>01. 알레르기 비염</span>
                            <span class="text-red-500 font-bold">+31%</span>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                            <span>02. 급성 인후염</span>
                            <span class="text-red-500 font-bold">+24%</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="card p-4 bg-teal-600 text-white">
                    <h3 class="text-sm opacity-80">주간 호흡기 신고 증가</h3>
                    <p class="text-4xl font-bold">18.3%</p>
                </div>
                <div class="card p-4">
                    <h3 class="text-sm text-gray-500">주목 질환</h3>
                    <p class="text-2xl font-bold">인플루엔자 A</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
